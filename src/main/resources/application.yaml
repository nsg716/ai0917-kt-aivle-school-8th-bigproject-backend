spring:
  application:
    name: ipai
  config:
    import:
      - optional:classpath:application-secret.yaml
      - optional:classpath:application-local.yaml


  # JPA 및 하이버네이트 설정
  jpa:
    hibernate:
      # update: 변경된 엔티티 클래스만 DB에 반영합니다.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# 로그 설정 (사용자 기존 설정 유지)
logging:
  level:
    org.springframework.security: DEBUG
    root: INFO
    com.aivle.ai0917.ipai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  charset:
    console: UTF-8

# 앱 버전 설정 (사용자 기존 설정 유지)
app:
  version: ${version}

server:
  # 서블릿 전역 인코딩 설정 (한글 깨짐 방지 핵심)
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true # 응답 헤더에 UTF-8 인코딩을 강제 적용합니다.

  tomcat:
    accesslog:
      enabled: true

file:
  dir: ./uploads/ # 기본값
#  dir: C:/data/ipai/uploads/ # 윈도우용 절대 경로
#  dir: /home/ubuntu/app/uploads/ # 리눅스용 절대 경로
